name: Deploy notes with Quartz

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout notes repo
        uses: actions/checkout@v4

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          path: quartz

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Copy notes into Quartz content
        run: |
          rm -rf quartz/content
          mkdir -p quartz/content
          rsync -av Labs/ quartz/content/Labs/
          rsync -av Paths/ quartz/content/Paths/
          rsync -av img/ quartz/content/img/
          cp index.md quartz/content/index.md
          cp README.md quartz/content/README.md

      - name: Copy Quartz config overrides
        run: |
          cp .quartz/quartz.config.ts quartz/quartz.config.ts
          cp .quartz/quartz.layout.ts quartz/quartz.layout.ts
          mkdir -p quartz/quartz/styles
          cp .quartz/custom.scss quartz/quartz/styles/custom.scss
          mkdir -p quartz/quartz/plugins/transformers
          cp .quartz/clickableImages.ts quartz/quartz/plugins/transformers/clickableImages.ts
          cp .quartz/index.ts quartz/quartz/plugins/transformers/index.ts

      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4